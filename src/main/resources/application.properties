# ============================================================
# CONFIGURACIÓN SPRING BOOT - TIENDA SENA
# Archivo: src/main/resources/application.properties
# ============================================================

# ---- Configuración del servidor ----
server.port=8080

# ---- Configuración de MySQL ----
# IMPORTANTE: Cambia 'tienda_sena' por el nombre de tu BD en MySQL.
# Cambia 'root' y 'tu_password' por tus credenciales reales.
spring.datasource.url=jdbc:mysql://localhost:3306/tienda_bicicletas?useSSL=false&serverTimezone=America/Bogota&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ---- Configuración de JPA / Hibernate ----
# update: Crea las tablas si no existen y actualiza la estructura sin borrar datos.
# create: (solo desarrollo) borra y re-crea las tablas al iniciar.
spring.jpa.hibernate.ddl-auto=update

# Mostrar las consultas SQL en consola (útil para aprendizaje y depuración)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Dialecto de MySQL para que Hibernate genere SQL optimizado para MySQL
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# Nombre de la aplicación
spring.application.name=tienda-bicicletas-sena